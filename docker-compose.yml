version: "3.8"

services:
    backend:
        image: ghcr.io/mysterioucz/wevis-datathon/backend:latest
        environment:
            - PORT=3001
            - FRONTEND_URL=http://43.210.116.106
        restart: unless-stopped

    frontend:
        image: ghcr.io/mysterioucz/wevis-datathon/frontend:latest
        environment:
            - PORT=3000
            - HOSTNAME=0.0.0.0
        restart: unless-stopped
        depends_on:
            - backend

    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        restart: unless-stopped
        depends_on:
            - frontend
            - backend
